<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>티끌모아금연</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="app-header">
    🚭 티끌모아금연
</header>

<div class="app">

<div class="section">
    <div class="grid">
        <div class="card"><p>누적 성공</p><h2 id="total">0</h2></div>
        <div class="card"><p>오늘 성공</p><h2 id="today">0</h2></div>
        <div class="card"><p>절약 금액</p><h2 id="money">0</h2></div>

        <div class="card"><p>연속 성공</p><h2 id="streak">0</h2></div>
        <div class="card"><p>오늘 목표</p><h2 id="goal">10</h2></div>
        <div class="card empty"></div>
    </div>
</div>

<div class="section section-progress">
    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <span id="progress-text">0 / 10</span>
</div>

<div class="section section-cta">
    <button class="cta-main" onclick="addCount()">🚭 참기 성공</button>
    <button class="cta-sub" onclick="sendMoney()">💸 절약금 송금</button>
</div>

<div class="section">
    <div class="cta-buttons">
        <button class="cta small" onclick="openStats()">📊 통계</button>
        <button class="cta small" onclick="openCalendar()">📅 달력</button>
        <button class="cta small danger" onclick="resetToday()">초기화</button>
    </div>
</div>

</div>

<!-- 통계 -->
<div id="statsModal" class="modal hidden">
    <div class="modal-content">
        <h2>최근 30일 통계</h2>
        <canvas id="chart" width="320" height="220"></canvas>
        <button onclick="closeModal()">닫기</button>
    </div>
</div>

<!-- 달력 -->
<div id="calendarModal" class="modal hidden">
    <div class="modal-content">
        <h2>월간 기록</h2>
        <div id="calendar"></div>
        <button onclick="closeModal()">닫기</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
